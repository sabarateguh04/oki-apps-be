<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Detail Tugas — OKI Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
<style>
  .file-chip{ display:inline-flex; align-items:center; gap:6px; background:#f1f3f6; border-radius:8px; padding:4px 10px; margin:2px 4px 2px 0; font-size:12.5px; }
  .work-proof-item{ display:inline-block; margin:4px 6px 4px 0; }
  .work-proof-item img{ width:96px; height:96px; object-fit:cover; border-radius:10px; border:1px solid #e9ecef; }
  .biaya-row-tech{ border:1px solid #eee; border-radius:10px; padding:10px; margin-bottom:8px; }
  .ba-check-item{ border:1px solid #eee; border-radius:10px; padding:10px 12px; margin-bottom:8px; }
  .ba-check-item.done{ background:#f4fbf6; border-color:#c8e9d3; }
  .ba-cat-badge{ background:#eef1f6; border-radius:8px; padding:2px 8px; font-size:11px; font-weight:600; }
</style>
</head>
<body>

<div class="content">
  <div id="topbar-slot"></div>

  <div class="page-body" id="page-body">
    <div class="skeleton" style="height:300px;"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
  const session = requireAuth(['technician']);
  const orderId = new URLSearchParams(location.search).get('id');
  let locMap = null;
  const JENIS_LABEL = { JASA:'Jasa', TRANSPORT:'Transport', MATERIAL:'Material', LAINNYA:'Lainnya' };

  if (session) {
    renderLayout({ active: 'profile', title: 'Detail Tugas' });
    if (!orderId) {
      document.getElementById('page-body').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>ID tugas tidak ditemukan di URL</p></div>';
    } else {
      loadTask();
    }
  }

  function fmtDateOnly(d) {
    if (!d) return null;
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return d;
    return dt.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
  }

  function fileChips(files) {
    if (!files || !files.length) return '<span class="text-muted small">Belum ada file</span>';
    return files.map(f => `<a href="${f.file_url}" target="_blank" class="file-chip"><i class="bi bi-paperclip"></i> ${f.judul ? escapeHtml(f.judul) : 'Lihat file'}</a>`).join('');
  }

  function baChecklistCard(items, canFill) {
    if (!items.length) return '';
    const pending = items.filter(i => i.status === 'PENDING').length;
    return `
      <div class="card mb-3">
        <div class="card-header d-flex align-items-center">
          <span class="flex-grow-1"><i class="bi bi-list-check"></i> Checklist Bukti Pekerjaan (BA)</span>
          <span class="badge ${pending === 0 ? 'badge-status-DONE' : 'badge-approval-PENDING'}">${pending === 0 ? 'Lengkap' : pending + ' belum diisi'}</span>
        </div>
        <div class="card-body">
          ${items.map(it => `
            <div class="ba-check-item ${it.status === 'DONE' ? 'done' : ''}" id="ba-item-${it.id}">
              <div class="d-flex align-items-start gap-2 flex-wrap">
                <span class="ba-cat-badge">${escapeHtml(it.category)}</span>
                <div class="flex-grow-1">
                  <div><b>${escapeHtml(it.template_name)}</b> ${it.status === 'DONE' ? '<i class="bi bi-check-circle-fill text-success"></i>' : ''}</div>
                  ${it.note_ba ? `<div class="text-muted small">${escapeHtml(it.note_ba)}</div>` : ''}
                  ${it.template_type === 'text' ? `
                    <div class="input-group input-group-sm mt-2" style="max-width:360px;">
                      <input type="text" class="form-control" id="ba-text-${it.id}" placeholder="Masukkan nilai" value="${it.text_value ? escapeHtml(it.text_value) : ''}" ${!canFill ? 'disabled' : ''}>
                      ${canFill ? `<button class="btn btn-outline-primary" onclick="saveBaText(${it.id})"><i class="bi bi-check-lg"></i></button>` : ''}
                    </div>
                  ` : `
                    <div class="mt-2">
                      ${it.file_url ? `<a href="${it.file_url}" target="_blank" class="file-chip"><i class="bi bi-paperclip"></i> Lihat file</a>` : ''}
                      ${canFill ? `
                        <input type="file" class="form-control form-control-sm mt-2" id="ba-file-${it.id}" accept="image/*,application/pdf" style="max-width:320px;">
                        <button class="btn btn-sm btn-outline-primary mt-1" onclick="uploadBaFile(${it.id})"><i class="bi bi-upload"></i> ${it.file_url ? 'Ganti File' : 'Upload'}</button>
                      ` : ''}
                    </div>
                  `}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  async function saveBaText(checklistId) {
    const input = document.getElementById(`ba-text-${checklistId}`);
    const value = input.value.trim();
    if (!value) { toast('Isi dulu nilainya', 'error'); return; }
    try {
      await api(`/api/orders/${orderId}/ba-checklist/${checklistId}`, { method: 'POST', body: JSON.stringify({ text_value: value }) });
      toast('Item checklist tersimpan', 'success');
      loadTask();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function uploadBaFile(checklistId) {
    const input = document.getElementById(`ba-file-${checklistId}`);
    if (!input.files || !input.files.length) { toast('Pilih file dulu', 'error'); return; }
    const fd = new FormData();
    fd.append('file', input.files[0]);
    try {
      await apiUpload(`/api/orders/${orderId}/ba-checklist/${checklistId}`, fd);
      toast('File checklist berhasil diupload', 'success');
      loadTask();
    } catch (e) { toast(e.message, 'error'); }
  }

  function workProofGallery(files) {
    if (!files || !files.length) return '<p class="text-muted small mb-0">Belum ada bukti pekerjaan diupload.</p>';
    return files.map(f => {
      const isImage = /\.(jpe?g|png|webp)$/i.test(f.file_url);
      return `<a href="${f.file_url}" target="_blank" class="work-proof-item" title="${f.judul ? escapeHtml(f.judul) : 'Bukti pekerjaan'}">
        ${isImage ? `<img src="${f.file_url}">` : `<span class="file-chip"><i class="bi bi-file-earmark-pdf"></i> ${f.judul ? escapeHtml(f.judul) : 'Lihat file'}</span>`}
      </a>`;
    }).join('');
  }

  async function loadTask() {
    try {
      const d = await api(`/api/orders/${orderId}`);
      render(d.order, d.timeline);
    } catch (e) {
      document.getElementById('page-body').innerHTML = `<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>${e.message}</p></div>`;
    }
  }

  function render(o, timeline) {
    const myRelation = [...(o.technicians_assigned||[]), ...(o.technicians_accepted||[]), ...(o.technicians_planned||[])]
      .find(t => Number(t.id) === Number(session.id));
    const isAssigned = (o.technicians_assigned||[]).some(t => Number(t.id) === Number(session.id));
    const canUploadProof = isAssigned && ['ON_THE_WAY','IN_PROGRESS','DONE'].includes(o.status);
    const biayaSaya = o.rincian_biaya || [];
    const baChecklist = o.ba_checklist || [];
    const hasBa = baChecklist.length > 0;
    const canFillBa = isAssigned && ['ON_THE_WAY','IN_PROGRESS','DONE'].includes(o.status);

    const mapLat = o.lokasi_lat || o.customer_lat;
    const mapLng = o.lokasi_lng || o.customer_lng;

    document.getElementById('page-body').innerHTML = `
      <div class="d-flex align-items-center flex-wrap gap-2 mb-3">
        <a href="profile" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
        <h4 class="mb-0 flex-grow-1">${o.order_no} — ${escapeHtml(o.nama_perusahaan)}</h4>
        ${statusBadge(o.status)} ${priorityBadge(o.priority)}
      </div>

      <div class="row g-3">
        <div class="col-lg-8">

          <div class="card mb-3">
            <div class="card-header"><i class="bi bi-info-circle"></i> Info Tugas</div>
            <div class="card-body">
              <div class="row mb-2"><div class="col-4 text-muted small">PIC Customer</div><div class="col-8">${escapeHtml(o.pic_nama || '-')} ${o.pic_hp ? '· ' + escapeHtml(o.pic_hp) : ''}</div></div>
              <div class="row mb-2"><div class="col-4 text-muted small">Wilayah</div><div class="col-8">${escapeHtml(o.wilayah || '-')}</div></div>
              <div class="row mb-2"><div class="col-4 text-muted small">Alamat Lokasi</div><div class="col-8">${escapeHtml(o.alamat_detail || o.customer_alamat || '-')}</div></div>
              <div class="row mb-2"><div class="col-4 text-muted small">Jadwal</div><div class="col-8">${o.tanggal_mulai ? fmtDateOnly(o.tanggal_mulai) : '-'} s/d ${o.tanggal_selesai_target ? fmtDateOnly(o.tanggal_selesai_target) : '-'}</div></div>
              <div class="row"><div class="col-4 text-muted small">Deskripsi Pekerjaan</div><div class="col-8">${escapeHtml(o.description || '-')}</div></div>
            </div>
          </div>

          ${mapLat && mapLng ? `
          <div class="card mb-3">
            <div class="card-header"><i class="bi bi-geo-alt"></i> Titik Lokasi</div>
            <div class="card-body p-0"><div id="loc-map" style="height:220px;border-radius:0 0 16px 16px;"></div></div>
          </div>` : ''}

          ${o.lampiran && o.lampiran.length ? `
          <div class="card mb-3">
            <div class="card-header"><i class="bi bi-paperclip"></i> Lampiran dari Admin</div>
            <div class="card-body">${fileChips(o.lampiran)}</div>
          </div>` : ''}

          ${baChecklistCard(baChecklist, canFillBa)}

          <div class="card mb-3">
            <div class="card-header"><i class="bi bi-camera"></i> ${hasBa ? 'Bukti Tambahan (di luar Checklist BA)' : 'Bukti Pekerjaan Saya'}</div>
            <div class="card-body">
              ${hasBa ? `<p class="text-muted small">Dipakai buat foto/file tambahan yang gak termasuk item checklist BA di atas, misal kondisi lokasi, catatan situasi, dsb. Checklist BA di atas tetap wajib diisi terpisah.</p>` : ''}
              <div id="work-proof-gallery">${workProofGallery(o.bukti_pekerjaan)}</div>
              ${canUploadProof ? `
                <hr>
                <label class="form-label small">Tambah foto/bukti pekerjaan baru</label>
                <input type="file" multiple class="form-control form-control-sm mb-2" id="proof-file" accept="image/*,application/pdf">
                <button class="btn btn-sm btn-primary" onclick="uploadProof()"><i class="bi bi-upload"></i> Upload</button>
              ` : `<div class="form-text mt-2">${isAssigned ? 'Upload bukti pekerjaan bisa dilakukan begitu status "Menuju Lokasi" ke atas.' : 'Anda belum di-assign final ke tugas ini.'}</div>`}
            </div>
          </div>

          <div class="card">
            <div class="card-header"><i class="bi bi-clock-history"></i> Timeline</div>
            <div class="card-body">
              ${timeline.length ? timeline.map(t => `
                <div class="tl-item">
                  <div class="tl-dot"><i class="bi bi-dot"></i></div>
                  <div>
                    <div class="tl-title">${t.event_type.replace(/_/g,' ')}</div>
                    ${t.note ? `<div class="tl-note">${escapeHtml(t.note)}</div>` : ''}
                    <div class="tl-time">${fmtDate(t.created_at)}</div>
                  </div>
                </div>`).join('') : '<div class="empty-state"><i class="bi bi-clock-history"></i><p>Belum ada aktivitas</p></div>'}
            </div>
          </div>

        </div>

        <div class="col-lg-4">

          ${isAssigned ? `
          <div class="card mb-3">
            <div class="card-header"><i class="bi bi-signpost-split"></i> Update Status</div>
            <div class="card-body d-grid gap-2">
              ${o.status === 'ASSIGNED' ? `<button class="btn btn-warning" onclick="updateMyStatus('ON_THE_WAY')"><i class="bi bi-signpost"></i> Menuju Lokasi</button>` : ''}
              ${o.status === 'ON_THE_WAY' ? `<button class="btn" style="background:#fd7e14;color:#fff;" onclick="updateMyStatus('IN_PROGRESS')"><i class="bi bi-tools"></i> Mulai Kerjakan</button>` : ''}
              ${o.status === 'IN_PROGRESS' ? (
                hasBa && baChecklist.some(i => i.status === 'PENDING')
                  ? `<button class="btn btn-success" disabled title="Lengkapi checklist BA dulu"><i class="bi bi-check-lg"></i> Selesaikan Order</button>
                     <div class="form-text text-center">Lengkapi semua checklist BA di atas dulu sebelum bisa menyelesaikan order.</div>`
                  : `<button class="btn btn-success" onclick="updateMyStatus('DONE')"><i class="bi bi-check-lg"></i> Selesaikan Order</button>`
              ) : ''}
              ${['DONE','CLOSED','CANCELLED'].includes(o.status) ? `<div class="text-muted small text-center">Tidak ada aksi lagi — status: ${o.status}</div>` : ''}
            </div>
          </div>` : `
          <div class="card mb-3"><div class="card-body">
            <div class="block-message"><i class="bi bi-hourglass-split"></i> <div><b>Menunggu konfirmasi Admin</b><br>Tawaran tugas ini belum di-assign final.</div></div>
          </div></div>`}

          <div class="card">
            <div class="card-header"><i class="bi bi-cash-coin"></i> Pembayaran Saya</div>
            <div class="card-body">
              ${biayaSaya.length ? `
                ${biayaSaya.map(b => `
                  <div class="biaya-row-tech">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                      <div>
                        <b>${JENIS_LABEL[b.jenis] || b.jenis}</b> ${b.deskripsi ? '— ' + escapeHtml(b.deskripsi) : ''}
                        <div class="text-muted small">${rupiah(b.jumlah)} · Timing: <span class="badge ${b.timing_bayar === 'SEBELUM' ? 'badge-priority-HIGH' : 'badge-status-DONE'}">${b.timing_bayar}</span></div>
                      </div>
                      <div>${b.status === 'DONE' ? '<span class="badge badge-status-DONE">Sudah Ditransfer</span>' : '<span class="badge badge-approval-PENDING">Belum Ditransfer</span>'}</div>
                    </div>
                    <div class="mt-2">${fileChips(b.bukti_files)}</div>
                  </div>
                `).join('')}
                <div class="d-flex justify-content-between mt-2 pt-2 border-top">
                  <b>Total</b>
                  <b class="text-primary">${rupiah(biayaSaya.reduce((s,b) => s + Number(b.jumlah), 0))}</b>
                </div>
                <div class="d-flex justify-content-between text-muted small">
                  <span>Sudah ditransfer</span>
                  <span>${rupiah(biayaSaya.filter(b=>b.status==='DONE').reduce((s,b) => s + Number(b.jumlah), 0))}</span>
                </div>
              ` : '<p class="text-muted small mb-0">Belum ada rincian biaya untuk tugas ini.</p>'}
            </div>
          </div>

        </div>
      </div>
    `;

    if (mapLat && mapLng) {
      setTimeout(() => {
        locMap = L.map('loc-map').setView([Number(mapLat), Number(mapLng)], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(locMap);
        L.marker([Number(mapLat), Number(mapLng)]).addTo(locMap);
        setTimeout(() => locMap.invalidateSize(), 200);
      }, 50);
    }
  }

  async function updateMyStatus(status) {
    try {
      await api(`/api/orders/${orderId}/status`, { method: 'POST', body: JSON.stringify({ status }) });
      toast('Status tugas diperbarui', 'success');
      loadTask();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function uploadProof() {
    const input = document.getElementById('proof-file');
    if (!input.files || !input.files.length) { toast('Pilih file dulu', 'error'); return; }
    const fd = new FormData();
    [...input.files].forEach(f => fd.append('files', f));
    try {
      await apiUpload(`/api/orders/${orderId}/pekerjaan`, fd);
      toast('Bukti pekerjaan berhasil diupload', 'success');
      loadTask();
    } catch (e) { toast(e.message, 'error'); }
  }
</script>
</body>
</html>
