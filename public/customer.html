<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Master Customer — OKI Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="content">
  <div id="topbar-slot"></div>

  <div class="page-body">
    <div class="card">
      <div class="card-header d-flex align-items-center">
        <span class="flex-grow-1"><i class="bi bi-people"></i> Master Customer</span>
        <button class="btn btn-sm btn-primary" onclick="openModal()"><i class="bi bi-plus-lg"></i> Tambah Customer</button>
      </div>
      <div class="card-body p-0">
        <table class="table mb-0">
          <thead><tr><th>Nama Perusahaan</th><th>PIC</th><th>No. HP</th><th>Alamat</th><th class="text-end">Aksi</th></tr></thead>
          <tbody id="customer-body">
            <tr><td colspan="5"><div class="skeleton" style="height:18px;margin:8px 0;"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="customerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:16px;">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title">Tambah Customer</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="c-id">
        <div class="mb-3"><label class="form-label">Nama Perusahaan *</label><input class="form-control" id="c-nama"></div>
        <div class="mb-3"><label class="form-label">Nama PIC</label><input class="form-control" id="c-pic"></div>
        <div class="mb-3"><label class="form-label">No. HP PIC</label><input class="form-control" id="c-hp"></div>
        <div class="mb-3"><label class="form-label">Alamat</label><textarea class="form-control" id="c-alamat" rows="2"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" onclick="saveCustomer()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
  const session = requireAuth(['staff']);
  if (session) { renderLayout({ active: 'customer', title: 'Master Customer' }); loadCustomers(); }

  let modal, customers = [];

  async function loadCustomers() {
    const body = document.getElementById('customer-body');
    try {
      const d = await api('/api/customers');
      customers = d.customers;
      if (!customers.length) {
        body.innerHTML = '<tr><td colspan="5"><div class="empty-state"><i class="bi bi-people"></i><p>Belum ada customer</p></div></td></tr>';
        return;
      }
      body.innerHTML = customers.map(c => `
        <tr>
          <td><b>${escapeHtml(c.nama_perusahaan)}</b></td>
          <td>${escapeHtml(c.pic_nama || '-')}</td>
          <td>${escapeHtml(c.pic_hp || '-')}</td>
          <td class="text-muted small">${escapeHtml(c.alamat || '-')}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary" onclick="openModal(${c.id})"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteCustomer(${c.id})"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`).join('');
    } catch (e) {
      body.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">${e.message}</td></tr>`;
    }
  }

  function openModal(id) {
    if (!modal) modal = new bootstrap.Modal(document.getElementById('customerModal'));
    const c = customers.find(x => x.id === id);
    document.getElementById('modal-title').textContent = c ? 'Edit Customer' : 'Tambah Customer';
    document.getElementById('c-id').value = c ? c.id : '';
    document.getElementById('c-nama').value = c ? c.nama_perusahaan : '';
    document.getElementById('c-pic').value = c ? (c.pic_nama || '') : '';
    document.getElementById('c-hp').value = c ? (c.pic_hp || '') : '';
    document.getElementById('c-alamat').value = c ? (c.alamat || '') : '';
    modal.show();
  }

  async function saveCustomer() {
    const id = document.getElementById('c-id').value;
    const payload = {
      nama_perusahaan: document.getElementById('c-nama').value.trim(),
      pic_nama: document.getElementById('c-pic').value.trim(),
      pic_hp: document.getElementById('c-hp').value.trim(),
      alamat: document.getElementById('c-alamat').value.trim(),
    };
    if (!payload.nama_perusahaan) { toast('Nama perusahaan wajib diisi', 'error'); return; }
    try {
      if (id) {
        await api(`/api/customers/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
      } else {
        await api('/api/customers', { method: 'POST', body: JSON.stringify(payload) });
      }
      toast('Customer berhasil disimpan', 'success');
      modal.hide();
      loadCustomers();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function deleteCustomer(id) {
    if (!confirm('Hapus customer ini?')) return;
    try {
      await api(`/api/customers/${id}`, { method: 'DELETE' });
      toast('Customer dihapus', 'success');
      loadCustomers();
    } catch (e) { toast(e.message, 'error'); }
  }
</script>
</body>
</html>
