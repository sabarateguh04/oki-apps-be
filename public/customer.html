<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Master Customer — OKI Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="content">
  <div id="topbar-slot"></div>

  <div class="page-body">
    <div class="card">
      <div class="card-header d-flex align-items-center">
        <span class="flex-grow-1"><i class="bi bi-people"></i> Master Customer</span>
        <button class="btn btn-sm btn-primary" onclick="openModal()"><i class="bi bi-plus-lg"></i> Tambah Customer</button>
      </div>
      <div class="card-body p-0">
        <table class="table mb-0">
          <thead><tr><th>Nama Perusahaan</th><th>Wilayah</th><th>PIC</th><th>Telp</th><th class="text-end">Aksi</th></tr></thead>
          <tbody id="customer-body">
            <tr><td colspan="5"><div class="skeleton" style="height:18px;margin:8px 0;"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="customerModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="border-radius:16px;">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title">Tambah Customer</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="c-id">

        <h6 class="fw-bold text-muted small text-uppercase mb-2">Info Perusahaan</h6>
        <div class="row">
          <div class="col-md-8 mb-3"><label class="form-label">Nama Perusahaan *</label><input class="form-control" id="c-nama"></div>
          <div class="col-md-4 mb-3"><label class="form-label">Telp Perusahaan</label><input class="form-control" id="c-telp"></div>
        </div>

        <h6 class="fw-bold text-muted small text-uppercase mb-2">PIC (Person in Charge)</h6>
        <div class="row">
          <div class="col-md-4 mb-3"><label class="form-label">Nama PIC</label><input class="form-control" id="c-pic"></div>
          <div class="col-md-4 mb-3"><label class="form-label">No. HP PIC</label><input class="form-control" id="c-hp"></div>
          <div class="col-md-4 mb-3"><label class="form-label">Email PIC</label><input type="email" class="form-control" id="c-email"></div>
        </div>

        <h6 class="fw-bold text-muted small text-uppercase mb-2">Alamat</h6>
        <div class="mb-3"><label class="form-label">Alamat Lengkap</label><textarea class="form-control" id="c-alamat" rows="2"></textarea></div>
        <div class="row">
          <div class="col-md-3 mb-3"><label class="form-label">Provinsi</label><input class="form-control" id="c-provinsi"></div>
          <div class="col-md-3 mb-3"><label class="form-label">Kab/Kota</label><input class="form-control" id="c-kabkota"></div>
          <div class="col-md-3 mb-3"><label class="form-label">Kecamatan</label><input class="form-control" id="c-kec"></div>
          <div class="col-md-3 mb-3"><label class="form-label">Kode Pos</label><input class="form-control" id="c-kodepos"></div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3"><label class="form-label">Latitude</label><input type="number" step="any" class="form-control" id="c-lat" placeholder="mis. -6.4025"></div>
          <div class="col-md-6 mb-3"><label class="form-label">Longitude</label><input type="number" step="any" class="form-control" id="c-lng" placeholder="mis. 106.7942"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" onclick="saveCustomer()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
  const session = requireAuth(['staff']);
  let modal, customers = [];
  if (session && session.role !== 'ADMIN') {
    document.body.innerHTML = '<div class="empty-state" style="margin:60px auto;"><i class="bi bi-shield-lock"></i><p>Master Customer hanya untuk role <b>Admin</b>.</p><a href="dashboard" class="btn btn-primary btn-sm">Kembali ke Dashboard</a></div>';
  } else if (session) {
    renderLayout({ active: 'customer', title: 'Master Customer' });
    loadCustomers();
  }

  async function loadCustomers() {
    const body = document.getElementById('customer-body');
    try {
      const d = await api('/api/customers');
      customers = d.customers;
      if (!customers.length) {
        body.innerHTML = '<tr><td colspan="5"><div class="empty-state"><i class="bi bi-people"></i><p>Belum ada customer</p></div></td></tr>';
        return;
      }
      body.innerHTML = customers.map(c => `
        <tr>
          <td><b>${escapeHtml(c.nama_perusahaan)}</b></td>
          <td class="text-muted small">${escapeHtml([c.kabupaten_kota, c.provinsi].filter(Boolean).join(', ') || '-')}</td>
          <td>${escapeHtml(c.pic_nama || '-')}</td>
          <td>${escapeHtml(c.telp_perusahaan || c.pic_hp || '-')}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary" onclick="openModal(${c.id})"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteCustomer(${c.id})"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`).join('');
    } catch (e) {
      body.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">${e.message}</td></tr>`;
    }
  }

  function openModal(id) {
    if (!modal) modal = new bootstrap.Modal(document.getElementById('customerModal'));
    const c = customers.find(x => x.id === id) || {};
    document.getElementById('modal-title').textContent = id ? 'Edit Customer' : 'Tambah Customer';
    document.getElementById('c-id').value = id || '';
    document.getElementById('c-nama').value = c.nama_perusahaan || '';
    document.getElementById('c-telp').value = c.telp_perusahaan || '';
    document.getElementById('c-pic').value = c.pic_nama || '';
    document.getElementById('c-hp').value = c.pic_hp || '';
    document.getElementById('c-email').value = c.pic_email || '';
    document.getElementById('c-alamat').value = c.alamat || '';
    document.getElementById('c-provinsi').value = c.provinsi || '';
    document.getElementById('c-kabkota').value = c.kabupaten_kota || '';
    document.getElementById('c-kec').value = c.kecamatan || '';
    document.getElementById('c-kodepos').value = c.kode_pos || '';
    document.getElementById('c-lat').value = c.latitude || '';
    document.getElementById('c-lng').value = c.longitude || '';
    modal.show();
  }

  async function saveCustomer() {
    const id = document.getElementById('c-id').value;
    const payload = {
      nama_perusahaan: document.getElementById('c-nama').value.trim(),
      telp_perusahaan: document.getElementById('c-telp').value.trim(),
      pic_nama: document.getElementById('c-pic').value.trim(),
      pic_hp: document.getElementById('c-hp').value.trim(),
      pic_email: document.getElementById('c-email').value.trim(),
      alamat: document.getElementById('c-alamat').value.trim(),
      provinsi: document.getElementById('c-provinsi').value.trim(),
      kabupaten_kota: document.getElementById('c-kabkota').value.trim(),
      kecamatan: document.getElementById('c-kec').value.trim(),
      kode_pos: document.getElementById('c-kodepos').value.trim(),
      latitude: document.getElementById('c-lat').value || null,
      longitude: document.getElementById('c-lng').value || null,
    };
    if (!payload.nama_perusahaan) { toast('Nama perusahaan wajib diisi', 'error'); return; }
    try {
      if (id) {
        await api(`/api/customers/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
      } else {
        await api('/api/customers', { method: 'POST', body: JSON.stringify(payload) });
      }
      toast('Customer berhasil disimpan', 'success');
      modal.hide();
      loadCustomers();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function deleteCustomer(id) {
    if (!confirm('Hapus customer ini?')) return;
    try {
      await api(`/api/customers/${id}`, { method: 'DELETE' });
      toast('Customer dihapus', 'success');
      loadCustomers();
    } catch (e) { toast(e.message, 'error'); }
  }
</script>
</body>
</html>
