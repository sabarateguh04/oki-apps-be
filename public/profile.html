<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile Teknisi — OKI Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .offer-card{ border:1px solid #ffe8a3; background:#fffbea; border-radius:12px; padding:12px; margin-bottom:10px; }
  .history-row{ border-bottom:1px solid #f0f0f0; padding:10px 0; }
  .history-row:last-child{ border-bottom:none; }
</style>
</head>
<body>

<div class="content">
  <div id="topbar-slot"></div>

  <div class="page-body">
    <div class="row g-3">

      <div class="col-lg-4">
        <div class="card mb-3">
          <div class="card-body text-center">
            <div class="av bg-primary text-white rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width:90px;height:90px;font-size:32px;font-weight:700;" id="avatar">?</div>
            <h4 id="tech-nama">-</h4>
            <div id="tech-skill" class="text-muted small mb-2">-</div>
            <div id="tech-status-badge"></div>
          </div>
        </div>

        <div class="card mb-3">
          <div class="card-header"><i class="bi bi-broadcast"></i> Status Kerja</div>
          <div class="card-body">
            <p class="text-muted small">Set status ke <b>READY</b> supaya bisa ditawari order &amp; mulai kirim lokasi GPS tiap 30 detik ke dashboard.</p>
            <div class="status-toggle mb-2">
              <button id="btn-offline" class="selected-offline" onclick="setStatus('OFFLINE')"><i class="bi bi-power"></i> Offline</button>
              <button id="btn-ready" class="selected-ready" onclick="setStatus('READY')"><i class="bi bi-broadcast"></i> Ready</button>
            </div>
            <div id="gps-indicator" class="text-muted small text-center" style="display:none;">
              <span class="gps-pulse"></span> Mengirim lokasi tiap 30 detik... <span id="gps-last"></span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><i class="bi bi-graph-up"></i> Performa Saya</div>
          <div class="card-body">
            <div class="row g-2 text-center">
              <div class="col-4"><div class="border rounded-3 p-2"><div class="fw-bold fs-5" id="perf-total">-</div><div class="text-muted small">Total</div></div></div>
              <div class="col-4"><div class="border rounded-3 p-2"><div class="fw-bold fs-5 text-success" id="perf-selesai">-</div><div class="text-muted small">Selesai</div></div></div>
              <div class="col-4"><div class="border rounded-3 p-2"><div class="fw-bold fs-5" id="perf-durasi">-</div><div class="text-muted small">Rata² Durasi</div></div></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-8">

        <div class="card mb-3" id="offers-card" style="display:none;">
          <div class="card-header"><i class="bi bi-bell"></i> Tawaran Tugas Baru</div>
          <div class="card-body" id="offers-body"></div>
        </div>

        <div class="card mb-3">
          <div class="card-header"><i class="bi bi-clipboard-check"></i> Order Aktif Saya</div>
          <div class="card-body" id="active-order-body">
            <div class="skeleton" style="height:120px;"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><i class="bi bi-clock-history"></i> Riwayat Tugas</div>
          <div class="card-body" id="history-body">
            <div class="skeleton" style="height:80px;"></div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
  const session = requireAuth(['technician']);
  let gpsTimer = null;
  let socket = null;

  if (session) {
    renderLayout({ active: 'profile', title: 'Profile Teknisi' });
    boot();
  }

  function boot() {
    loadProfile();
    loadOffers();
    loadHistory();
    connectSocket();
  }

  function connectSocket() {
    socket = io({ transports: ['websocket'] });
    socket.on('connect', () => socket.emit('register-technician', session.id));
    socket.on('new-offer', () => {
      toast('Ada tawaran tugas baru buat kamu!', 'success');
      loadOffers();
    });
    socket.on('assignment-confirmed', () => {
      toast('Tugas kamu sudah dikonfirmasi admin, siap dikerjakan!', 'success');
      loadActiveOrder();
    });
  }

  async function loadProfile() {
    try {
      const d = await api(`/api/technicians/${session.id}`);
      const t = d.technician, p = d.performance;
      document.getElementById('avatar').textContent = (t.nama || '?').slice(0,1).toUpperCase();
      document.getElementById('tech-nama').textContent = t.nama;
      document.getElementById('tech-skill').textContent = t.spesialisasi || t.skill || '-';
      document.getElementById('tech-status-badge').innerHTML = techStatusBadge(t.status);
      document.getElementById('perf-total').textContent = p.total_order || 0;
      document.getElementById('perf-selesai').textContent = p.total_selesai || 0;
      document.getElementById('perf-durasi').textContent = p.avg_durasi_menit ? Math.round(p.avg_durasi_menit) + 'm' : '-';

      applyStatusUI(t.status);
      if (t.status !== 'OFFLINE') startGpsLoop();

      loadActiveOrder();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function applyStatusUI(status) {
    const offBtn = document.getElementById('btn-offline');
    const readyBtn = document.getElementById('btn-ready');
    offBtn.classList.toggle('selected', status === 'OFFLINE');
    readyBtn.classList.toggle('selected', status !== 'OFFLINE');
    document.getElementById('gps-indicator').style.display = status !== 'OFFLINE' ? 'block' : 'none';
  }

  async function setStatus(status) {
    try {
      await api(`/api/technicians/${session.id}/status`, { method: 'POST', body: JSON.stringify({ status }) });
      applyStatusUI(status);
      if (status === 'OFFLINE') stopGpsLoop(); else startGpsLoop();
      toast(`Status diubah ke ${status}`, 'success');
    } catch (e) { toast(e.message, 'error'); }
  }

  /* ── GPS ping tiap 30 detik selama status bukan OFFLINE ── */
  let gpsPermissionWarned = false;

  function startGpsLoop() {
    if (gpsTimer) return;
    sendGpsPing();
    gpsTimer = setInterval(sendGpsPing, 30000);
  }
  function stopGpsLoop() {
    if (gpsTimer) { clearInterval(gpsTimer); gpsTimer = null; }
  }

  function sendGpsPing() {
    if (!navigator.geolocation) {
      if (!gpsPermissionWarned) { toast('Browser tidak mendukung geolokasi', 'error'); gpsPermissionWarned = true; }
      return;
    }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        try {
          await api(`/api/technicians/${session.id}/location`, {
            method: 'POST',
            body: JSON.stringify({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
          });
          document.getElementById('gps-last').textContent = '(terakhir: ' + new Date().toLocaleTimeString('id-ID') + ')';
        } catch (e) { console.error('[GPS]', e.message); }
      },
      () => {
        if (!gpsPermissionWarned) { toast('Izin lokasi ditolak — GPS tidak bisa dikirim', 'error'); gpsPermissionWarned = true; }
      },
      { enableHighAccuracy: true, timeout: 10000 },
    );
  }

  /* ── Tawaran tugas (belum direspon) ── */
  async function loadOffers() {
    const card = document.getElementById('offers-card');
    const body = document.getElementById('offers-body');
    try {
      const d = await api('/api/orders/offers/mine');
      if (!d.offers.length) { card.style.display = 'none'; return; }
      card.style.display = 'block';
      body.innerHTML = d.offers.map(o => `
        <div class="offer-card">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
            <div>
              <b>${o.order_no}</b> — ${escapeHtml(o.nama_perusahaan)}
              <div class="text-muted small">${escapeHtml(o.wilayah || '-')} · ${o.tanggal_mulai ? fmtDate(o.tanggal_mulai) : 'Jadwal belum ditentukan'}</div>
              <div class="small mt-1">${escapeHtml(o.description || '')}</div>
            </div>
          </div>
          <div class="d-flex gap-2 mt-2">
            <button class="btn btn-sm btn-success flex-grow-1" onclick="respondOffer(${o.id}, 'ACCEPTED')"><i class="bi bi-check-lg"></i> Terima</button>
            <button class="btn btn-sm btn-outline-danger flex-grow-1" onclick="respondOffer(${o.id}, 'REJECTED')"><i class="bi bi-x-lg"></i> Tolak</button>
          </div>
        </div>
      `).join('');
    } catch (e) {
      card.style.display = 'block';
      body.innerHTML = `<div class="text-danger small">${e.message}</div>`;
    }
  }

  async function respondOffer(orderId, response) {
    let note = null;
    if (response === 'REJECTED') {
      note = prompt('Alasan menolak (opsional):') || null;
    }
    try {
      await api(`/api/orders/${orderId}/respond`, { method: 'POST', body: JSON.stringify({ response, note }) });
      toast(response === 'ACCEPTED' ? 'Tugas diterima, menunggu konfirmasi admin' : 'Tugas ditolak', 'success');
      loadOffers();
    } catch (e) { toast(e.message, 'error'); }
  }

  /* ── Order aktif (sudah di-assign final, lagi dikerjakan) ── */
  async function loadActiveOrder() {
    const body = document.getElementById('active-order-body');
    try {
      const d = await api(`/api/orders?technician_id=${session.id}&limit=20`);
      const active = d.orders.find(o => ['ASSIGNED','ON_THE_WAY','IN_PROGRESS'].includes(o.status));
      if (!active) {
        body.innerHTML = '<div class="empty-state"><i class="bi bi-clipboard-x"></i><p>Belum ada order aktif yang ditugaskan ke kamu.</p></div>';
        return;
      }
      const full = await api(`/api/orders/${active.id}`);
      const o = full.order;
      body.innerHTML = `
        <div class="d-flex align-items-center gap-2 mb-3">
          <h5 class="mb-0 flex-grow-1">${o.order_no} — ${escapeHtml(o.nama_perusahaan)}</h5>
          ${statusBadge(o.status)} ${priorityBadge(o.priority)}
        </div>
        <p class="text-muted">${escapeHtml(o.description || 'Tidak ada deskripsi.')}</p>
        <div class="row mb-3">
          <div class="col-6 text-muted small">Alamat</div><div class="col-6 fw-semibold">${escapeHtml(o.alamat_detail || o.customer_alamat || '-')}</div>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          ${o.status === 'ASSIGNED' ? `<button class="btn btn-warning" onclick="updateMyStatus(${o.id}, 'ON_THE_WAY')"><i class="bi bi-signpost"></i> Menuju Lokasi</button>` : ''}
          ${o.status === 'ON_THE_WAY' ? `<button class="btn" style="background:#fd7e14;color:#fff;" onclick="updateMyStatus(${o.id}, 'IN_PROGRESS')"><i class="bi bi-tools"></i> Mulai Kerjakan</button>` : ''}
          ${o.status === 'IN_PROGRESS' ? `<button class="btn btn-success" onclick="updateMyStatus(${o.id}, 'DONE')"><i class="bi bi-check-lg"></i> Selesaikan Order</button>` : ''}
          <a href="task-detail?id=${o.id}" class="btn btn-outline-primary"><i class="bi bi-file-earmark-text"></i> Lihat Detail &amp; Upload Bukti Pekerjaan</a>
        </div>
      `;
    } catch (e) {
      body.innerHTML = `<div class="text-danger">${e.message}</div>`;
    }
  }

  async function updateMyStatus(orderId, status) {
    try {
      await api(`/api/orders/${orderId}/status`, { method: 'POST', body: JSON.stringify({ status }) });
      toast('Status order diperbarui', 'success');
      loadActiveOrder();
      loadProfile();
      loadHistory();
    } catch (e) { toast(e.message, 'error'); }
  }

  /* ── Riwayat tugas (semua order yang pernah di-assign, TERMASUK yang
       udah DONE/CLOSED/CANCELLED — ini yang sebelumnya "ilang" karena
       cuma order aktif yang ditampilkan) ── */
  async function loadHistory() {
    const body = document.getElementById('history-body');
    try {
      const d = await api(`/api/orders?technician_id=${session.id}&limit=50`);
      const history = d.orders.filter(o => ['DONE','CLOSED','CANCELLED','REJECTED'].includes(o.status));
      if (!history.length) {
        body.innerHTML = '<div class="empty-state"><i class="bi bi-clock-history"></i><p>Belum ada riwayat tugas.</p></div>';
        return;
      }
      body.innerHTML = history.map(o => `
        <a href="task-detail?id=${o.id}" class="history-row d-flex justify-content-between align-items-center flex-wrap gap-2 text-decoration-none text-reset">
          <div>
            <b>${o.order_no}</b> — ${escapeHtml(o.nama_perusahaan)}
            <div class="text-muted small">${fmtDate(o.created_at)} ${o.selesai_at ? '· selesai ' + fmtDate(o.selesai_at) : ''}</div>
          </div>
          <div>${statusBadge(o.status)} <i class="bi bi-chevron-right text-muted"></i></div>
        </a>
      `).join('');
    } catch (e) {
      body.innerHTML = `<div class="text-danger small">${e.message}</div>`;
    }
  }
</script>
</body>
</html>
