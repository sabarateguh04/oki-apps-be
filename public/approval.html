<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Approval Order — OKI Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="content">
  <div id="topbar-slot"></div>

  <div class="page-body">
    <div class="card">
      <div class="card-header d-flex align-items-center">
        <span class="flex-grow-1"><i class="bi bi-check2-square"></i> Order Menunggu Approval</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadPending()"><i class="bi bi-arrow-clockwise"></i></button>
      </div>
      <div class="card-body p-0">
        <table class="table mb-0">
          <thead><tr><th>No. Order</th><th>Customer</th><th>Kategori</th><th>Prioritas</th><th>Dibuat</th><th class="text-end">Aksi</th></tr></thead>
          <tbody id="approval-body">
            <tr><td colspan="6"><div class="skeleton" style="height:18px;margin:8px 0;"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
  const session = requireAuth(['staff']);
  const canApprove = session && ['ADMIN', 'ATASAN'].includes(session.role);

  if (session) { renderLayout({ active: 'approval', title: 'Approval Order' }); loadPending(); }

  async function loadPending() {
    const body = document.getElementById('approval-body');
    body.innerHTML = '<tr><td colspan="6"><div class="skeleton" style="height:18px;margin:8px 0;"></div></td></tr>';
    try {
      const d = await api('/api/orders?approval_status=PENDING&limit=50');
      if (!d.orders.length) {
        body.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="bi bi-check2-all"></i><p>Semua order sudah diproses 🎉</p></div></td></tr>';
        return;
      }
      body.innerHTML = d.orders.map(o => `
        <tr>
          <td><a href="order-detail.html?id=${o.id}"><b>${o.order_no}</b></a></td>
          <td>${escapeHtml(o.nama_perusahaan)}</td>
          <td>${o.category}</td>
          <td>${priorityBadge(o.priority)}</td>
          <td class="text-muted small">${fmtDate(o.created_at)}</td>
          <td class="text-end">
            ${canApprove ? `
              <button class="btn btn-sm btn-success" onclick="approve(${o.id})"><i class="bi bi-check-lg"></i></button>
              <button class="btn btn-sm btn-outline-danger" onclick="reject(${o.id})"><i class="bi bi-x-lg"></i></button>
            ` : `<span class="text-muted small">Hanya Atasan/Admin</span>`}
          </td>
        </tr>`).join('');
    } catch (e) {
      body.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">${e.message}</td></tr>`;
    }
  }

  async function approve(id) {
    if (!confirm('Setujui order ini?')) return;
    try {
      await api(`/api/orders/${id}/approve`, { method: 'POST', body: JSON.stringify({ approved_by: session.id }) });
      toast('Order disetujui', 'success');
      loadPending();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function reject(id) {
    const note = prompt('Alasan penolakan (opsional):');
    if (note === null) return;
    try {
      await api(`/api/orders/${id}/reject`, { method: 'POST', body: JSON.stringify({ rejected_by: session.id, note }) });
      toast('Order ditolak', 'success');
      loadPending();
    } catch (e) { toast(e.message, 'error'); }
  }
</script>
</body>
</html>
