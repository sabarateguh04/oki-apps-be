<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Master BA — OKI Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .ba-item-row{ border:1px solid #eee; border-radius:10px; padding:10px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
  .ba-item-row .cat-badge{ background:#eef1f6; border-radius:8px; padding:3px 10px; font-size:12px; font-weight:600; white-space:nowrap; }
</style>
</head>
<body>

<div class="content">
  <div id="topbar-slot"></div>

  <div class="page-body" id="page-body">
    <div class="skeleton" style="height:300px;"></div>
  </div>
</div>

<!-- Modal buat bikin BA baru (kalau customer belum punya) -->
<div class="modal fade" id="createBaModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:16px;">
      <div class="modal-header">
        <h5 class="modal-title">Buat Master BA</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="form-label">Nama BA *</label>
        <input class="form-control" id="new-ba-name" placeholder="mis. Ba Sekolah Rakyat">
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" onclick="createBa()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal tambah/edit item checklist -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:16px;">
      <div class="modal-header">
        <h5 class="modal-title" id="item-modal-title">Tambah Item Checklist</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="i-id">
        <div class="mb-3">
          <label class="form-label">Kategori *</label>
          <input class="form-control" id="i-category" placeholder="mis. SN, INSTALASI, PERANGKAT, LAINNYA (bebas)" list="category-suggestions">
          <datalist id="category-suggestions"></datalist>
        </div>
        <div class="mb-3">
          <label class="form-label">Nama Item *</label>
          <input class="form-control" id="i-name" placeholder="mis. SN # Switch Distribution & Access - 1">
        </div>
        <div class="mb-3">
          <label class="form-label">Tipe Pengisian *</label>
          <select class="form-select" id="i-type">
            <option value="file">File (upload foto/dokumen)</option>
            <option value="text">Text (input manual, mis. serial number)</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Catatan / Instruksi buat Teknisi</label>
          <input class="form-control" id="i-note" placeholder="mis. scan barcode / manual input serial number">
        </div>
        <div class="mb-3">
          <label class="form-label">Urutan Tampil</label>
          <input type="number" class="form-control" id="i-urutan" value="0">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" onclick="saveItem()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
  const session = requireAuth(['staff']);
  const customerId = new URLSearchParams(location.search).get('customer_id');
  let createBaModal, itemModal, currentBa = null, currentTemplates = [];

  if (session && session.role !== 'ADMIN') {
    document.body.innerHTML = '<div class="empty-state" style="margin:60px auto;"><i class="bi bi-shield-lock"></i><p>Master BA hanya untuk role <b>Admin</b>.</p><a href="dashboard" class="btn btn-primary btn-sm">Kembali ke Dashboard</a></div>';
  } else if (session) {
    renderLayout({ active: 'customer', title: 'Master BA' });
    if (!customerId) {
      document.getElementById('page-body').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>customer_id tidak ditemukan di URL</p></div>';
    } else {
      load();
    }
  }

  async function load() {
    try {
      const [customerRes, baRes] = await Promise.all([
        api(`/api/customers/${customerId}`),
        api(`/api/customers/${customerId}/ba`),
      ]);
      currentBa = baRes.ba;
      currentTemplates = baRes.templates;
      render(customerRes.customer);
    } catch (e) {
      document.getElementById('page-body').innerHTML = `<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>${e.message}</p></div>`;
    }
  }

  function render(customer) {
    document.getElementById('page-body').innerHTML = `
      <div class="d-flex align-items-center flex-wrap gap-2 mb-3">
        <a href="customer" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
        <h4 class="mb-0 flex-grow-1">Master BA — ${escapeHtml(customer.nama_perusahaan)}</h4>
      </div>

      ${!currentBa ? `
      <div class="card">
        <div class="card-body text-center py-5">
          <i class="bi bi-file-earmark-text" style="font-size:2.5rem;color:#adb5bd;"></i>
          <p class="text-muted mt-2 mb-3">Customer ini belum punya Master BA.<br>Tanpa BA, teknisi upload bukti pekerjaan bebas seperti biasa.</p>
          <button class="btn btn-primary" onclick="openCreateBa()"><i class="bi bi-plus-lg"></i> Buat Master BA</button>
        </div>
      </div>` : `
      <div class="card mb-3">
        <div class="card-header d-flex align-items-center">
          <span class="flex-grow-1"><i class="bi bi-file-earmark-text"></i> ${escapeHtml(currentBa.ba_name)}</span>
          <button class="btn btn-sm btn-outline-secondary me-2" onclick="renameBa()"><i class="bi bi-pencil"></i> Ganti Nama</button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteBa()"><i class="bi bi-trash"></i> Hapus BA</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header d-flex align-items-center">
          <span class="flex-grow-1"><i class="bi bi-list-check"></i> Item Checklist (${currentTemplates.length})</span>
          <button class="btn btn-sm btn-primary" onclick="openItemModal()"><i class="bi bi-plus-lg"></i> Tambah Item</button>
        </div>
        <div class="card-body">
          ${currentTemplates.length ? currentTemplates.map(t => `
            <div class="ba-item-row">
              <span class="cat-badge">${escapeHtml(t.category)}</span>
              <div class="flex-grow-1">
                <div><b>${escapeHtml(t.template_name)}</b> <span class="badge ${t.template_type === 'file' ? 'badge-status-DONE' : 'badge-priority-MEDIUM'}">${t.template_type === 'file' ? 'File' : 'Text'}</span></div>
                ${t.note_ba ? `<div class="text-muted small">${escapeHtml(t.note_ba)}</div>` : ''}
              </div>
              <button class="btn btn-sm btn-outline-primary" onclick="openItemModal(${t.id})"><i class="bi bi-pencil"></i></button>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteItem(${t.id})"><i class="bi bi-trash"></i></button>
            </div>
          `).join('') : '<div class="empty-state"><i class="bi bi-list-check"></i><p>Belum ada item checklist. Tambah item dulu supaya teknisi punya panduan bukti kerja.</p></div>'}
        </div>
      </div>`}
    `;

    // isi datalist saran kategori dari kategori yang sudah pernah dipakai
    const cats = [...new Set(currentTemplates.map(t => t.category))];
    const dl = document.getElementById('category-suggestions');
    if (dl) dl.innerHTML = cats.map(c => `<option value="${escapeHtml(c)}">`).join('');
  }

  function openCreateBa() {
    if (!createBaModal) createBaModal = new bootstrap.Modal(document.getElementById('createBaModal'));
    document.getElementById('new-ba-name').value = '';
    createBaModal.show();
  }

  async function createBa() {
    const ba_name = document.getElementById('new-ba-name').value.trim();
    if (!ba_name) { toast('Nama BA wajib diisi', 'error'); return; }
    try {
      await api(`/api/customers/${customerId}/ba`, { method: 'POST', body: JSON.stringify({ ba_name }) });
      toast('Master BA berhasil dibuat', 'success');
      createBaModal.hide();
      load();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function renameBa() {
    const name = prompt('Nama BA baru:', currentBa.ba_name);
    if (!name || !name.trim()) return;
    try {
      await api(`/api/customers/${customerId}/ba`, { method: 'PUT', body: JSON.stringify({ ba_name: name.trim() }) });
      toast('Nama BA berhasil diubah', 'success');
      load();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function deleteBa() {
    if (!confirm(`Hapus Master BA "${currentBa.ba_name}" beserta semua item checklist-nya? Order yang sudah ada tidak terpengaruh.`)) return;
    try {
      await api(`/api/customers/${customerId}/ba`, { method: 'DELETE' });
      toast('Master BA dihapus', 'success');
      load();
    } catch (e) { toast(e.message, 'error'); }
  }

  function openItemModal(id) {
    if (!itemModal) itemModal = new bootstrap.Modal(document.getElementById('itemModal'));
    const t = currentTemplates.find(x => x.id === id) || {};
    document.getElementById('item-modal-title').textContent = id ? 'Edit Item Checklist' : 'Tambah Item Checklist';
    document.getElementById('i-id').value = id || '';
    document.getElementById('i-category').value = t.category || '';
    document.getElementById('i-name').value = t.template_name || '';
    document.getElementById('i-type').value = t.template_type || 'file';
    document.getElementById('i-note').value = t.note_ba || '';
    document.getElementById('i-urutan').value = t.urutan ?? 0;
    itemModal.show();
  }

  async function saveItem() {
    const id = document.getElementById('i-id').value;
    const payload = {
      category: document.getElementById('i-category').value.trim(),
      template_name: document.getElementById('i-name').value.trim(),
      template_type: document.getElementById('i-type').value,
      note_ba: document.getElementById('i-note').value.trim(),
      urutan: Number(document.getElementById('i-urutan').value) || 0,
    };
    if (!payload.category || !payload.template_name) { toast('Kategori dan nama item wajib diisi', 'error'); return; }
    try {
      if (id) {
        await api(`/api/customers/${customerId}/ba/template/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
      } else {
        await api(`/api/customers/${customerId}/ba/template`, { method: 'POST', body: JSON.stringify(payload) });
      }
      toast('Item checklist berhasil disimpan', 'success');
      itemModal.hide();
      load();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function deleteItem(id) {
    if (!confirm('Hapus item checklist ini?')) return;
    try {
      await api(`/api/customers/${customerId}/ba/template/${id}`, { method: 'DELETE' });
      toast('Item checklist dihapus', 'success');
      load();
    } catch (e) { toast(e.message, 'error'); }
  }
</script>
</body>
</html>
