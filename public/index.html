<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OKI Maintenance System — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body{
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#0d6efd 0%,#0b5ed7 60%,#0a4bb8 100%);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  .login-card{
    width:400px; max-width:92vw;
    background:#fff;
    border-radius:20px;
    padding:36px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .brand{ text-align:center; margin-bottom:22px; }
  .brand .icon{
    width:60px; height:60px; border-radius:16px;
    background:#0d6efd; color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:28px; margin:0 auto 12px;
  }
  .brand h1{ font-size:18px; font-weight:800; margin:0; }
  .brand p{ font-size:12.5px; color:#6c757d; margin-top:2px; }

  .role-tabs{ display:flex; background:#f4f6f9; border-radius:12px; padding:5px; margin-bottom:20px; }
  .role-tabs button{
    flex:1; border:none; background:transparent; padding:9px; border-radius:9px;
    font-weight:700; font-size:13px; color:#6c757d;
  }
  .role-tabs button.active{ background:#0d6efd; color:#fff; }

  .form-label{ font-size:12.5px; font-weight:600; color:#495057; }
  .form-control{ border-radius:10px; padding:10px 14px; font-size:13.5px; }
  .btn-login{ border-radius:10px; padding:11px; font-weight:700; font-size:14px; }
  .error-box{ font-size:12.5px; color:#dc3545; background:#f8d7da; border-radius:8px; padding:9px 12px; display:none; margin-bottom:14px; }
  .hint{ font-size:11.5px; color:#98a2b3; text-align:center; margin-top:16px; }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="icon"><i class="bi bi-tools"></i></div>
    <h1>O'MS APPS</h1>
    <p>Oky Maintenance System</p>
    <!-- <p>Oky Order & Teknisi Management</p> -->
  </div>

  <div class="role-tabs">
    <!-- <button type="button" id="tab-staff" class="active" onclick="switchTab('staff')">Staff</button> -->
    <!-- <button type="button" id="tab-technician" onclick="switchTab('technician')">Teknisi</button> -->
  </div>

  <div id="error-box" class="error-box"></div>

  <form id="login-form" onsubmit="return doLogin(event)">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" id="username" placeholder="Masukkan username" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
    </div>
    <div class="d-grid">
      <button type="submit" class="btn btn-primary btn-login" id="btn-submit">
        <i class="bi bi-box-arrow-in-right"></i> Masuk
      </button>
    </div>
  </form>

  <p class="hint" id="demo-hint">Demo staff: <code>admin</code> / <code>password123</code></p>
</div>

<script src="js/api.js"></script>
<script>
  let currentTab = 'staff';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-staff').classList.toggle('active', tab === 'staff');
    document.getElementById('tab-technician').classList.toggle('active', tab === 'technician');
    document.getElementById('demo-hint').innerHTML = tab === 'staff'
      ? 'Demo staff: <code>admin</code> / <code>password123</code>'
      : 'Demo teknisi: <code>teknisi1</code> / <code>password123</code>';
    hideError();
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.style.display = 'block';
  }
  function hideError() {
    document.getElementById('error-box').style.display = 'none';
  }

  async function doLogin(e) {
    e.preventDefault();
    hideError();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Memproses...';

    try {
      if (currentTab === 'staff') {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
        });
        setSession({ type: 'staff', id: data.userId, username: data.username, nama: data.nama, role: data.role, token: data.token });
        window.location.href = 'dashboard';
      } else {
        const data = await api('/api/auth/login-technician', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
        });
        setSession({ type: 'technician', id: data.technicianId, username: data.username, nama: data.nama, status: data.status, token: data.token });
        window.location.href = 'profile';
      }
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Masuk';
    }
    return false;
  }

  // Kalau sudah login sebelumnya, langsung lempar ke halaman yang sesuai
  (function redirectIfLoggedIn(){
    const s = getSession();
    if (s) window.location.href = s.type === 'technician' ? 'profile' : 'dashboard';
  })();
</script>
</body>
</html>
