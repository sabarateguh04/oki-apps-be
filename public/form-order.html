<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Form Order — OKI Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="content">
  <div id="topbar-slot"></div>

  <div class="page-body">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card">
          <div class="card-header"><i class="bi bi-plus-lg"></i> Buat Order Baru</div>
          <div class="card-body">
            <form id="order-form" onsubmit="return submitOrder(event)">

              <div class="mb-3">
                <label class="form-label">Customer *</label>
                <select class="form-select" id="customer_id" required>
                  <option value="">Memuat customer...</option>
                </select>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Kategori</label>
                  <select class="form-select" id="category">
                    <option value="CORRECTIVE">Corrective</option>
                    <option value="PREVENTIVE">Preventive</option>
                    <option value="INSTALLATION">Installation</option>
                    <option value="INSPECTION">Inspection</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Prioritas</label>
                  <select class="form-select" id="priority">
                    <option value="HIGH">HIGH</option>
                    <option value="MEDIUM" selected>MEDIUM</option>
                    <option value="LOW">LOW</option>
                  </select>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Deskripsi Pekerjaan</label>
                <textarea class="form-control" id="description" rows="3" placeholder="Jelaskan pekerjaan yang perlu dilakukan..."></textarea>
              </div>

              <hr>
              <h6 class="fw-bold mb-3"><i class="bi bi-cash-coin"></i> Skema Pembayaran</h6>

              <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="has_pre_bayar" onchange="togglePreBayar()">
                <label class="form-check-label" for="has_pre_bayar">Ada pre-bayar material/equipment</label>
              </div>

              <div class="row" id="pre-bayar-row" style="display:none;">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Nominal Pre-Bayar</label>
                  <input type="number" class="form-control" id="pre_bayar_amount" placeholder="0">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Timing Bayar Jasa Teknisi</label>
                <div class="btn-group w-100" role="group">
                  <input type="radio" class="btn-check" name="payment_timing" id="pt-sebelum" value="SEBELUM" autocomplete="off">
                  <label class="btn btn-outline-primary" for="pt-sebelum">Bayar Sebelum Eksekusi</label>
                  <input type="radio" class="btn-check" name="payment_timing" id="pt-sesudah" value="SESUDAH" autocomplete="off" checked>
                  <label class="btn btn-outline-primary" for="pt-sesudah">Bayar Sesudah Eksekusi</label>
                </div>
                <div class="form-text">Kalau "Sebelum", teknisi baru bisa di-assign setelah Finance menandai transfer jasa teknisi selesai.</div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Estimasi Biaya Jasa</label>
                  <input type="number" class="form-control" id="biaya_jasa" placeholder="0">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Estimasi Biaya Sparepart</label>
                  <input type="number" class="form-control" id="biaya_sparepart" placeholder="0">
                </div>
              </div>

              <div class="d-flex gap-2 mt-4">
                <a href="orders.html" class="btn btn-outline-secondary">Batal</a>
                <button type="submit" class="btn btn-primary flex-grow-1" id="btn-submit">
                  <i class="bi bi-send"></i> Buat & Kirim Order
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
  const session = requireAuth(['staff']);
  if (session) { renderLayout({ active: 'orders', title: 'Buat Order Baru' }); loadCustomers(); }

  async function loadCustomers() {
    const sel = document.getElementById('customer_id');
    try {
      const d = await api('/api/customers');
      if (!d.customers.length) {
        sel.innerHTML = '<option value="">Belum ada customer — tambah dulu di Master Customer</option>';
        return;
      }
      sel.innerHTML = '<option value="">Pilih customer...</option>' +
        d.customers.map(c => `<option value="${c.id}">${escapeHtml(c.nama_perusahaan)}</option>`).join('');
    } catch (e) {
      sel.innerHTML = '<option value="">Gagal memuat customer</option>';
      toast(e.message, 'error');
    }
  }

  function togglePreBayar() {
    document.getElementById('pre-bayar-row').style.display =
      document.getElementById('has_pre_bayar').checked ? 'flex' : 'none';
  }

  async function submitOrder(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menyimpan...';

    try {
      const payload = {
        customer_id: Number(document.getElementById('customer_id').value),
        category: document.getElementById('category').value,
        priority: document.getElementById('priority').value,
        description: document.getElementById('description').value.trim(),
        has_pre_bayar: document.getElementById('has_pre_bayar').checked,
        pre_bayar_amount: Number(document.getElementById('pre_bayar_amount').value) || null,
        payment_timing: document.querySelector('input[name="payment_timing"]:checked').value,
        biaya_jasa: Number(document.getElementById('biaya_jasa').value) || 0,
        biaya_sparepart: Number(document.getElementById('biaya_sparepart').value) || 0,
        created_by: session.id,
      };
      if (!payload.customer_id) throw new Error('Pilih customer dulu');

      const d = await api('/api/orders', { method: 'POST', body: JSON.stringify(payload) });
      toast(`Order ${d.orderNo} berhasil dibuat`, 'success');
      setTimeout(() => location.href = `order-detail.html?id=${d.orderId}`, 600);
    } catch (err) {
      toast(err.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-send"></i> Buat & Kirim Order';
    }
    return false;
  }
</script>
</body>
</html>
