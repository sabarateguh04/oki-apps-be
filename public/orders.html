<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data Order — OKI Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="content">
  <div id="topbar-slot"></div>

  <div class="page-body">
    <div class="card">
      <div class="card-header d-flex align-items-center flex-wrap gap-2">
        <span class="flex-grow-1"><i class="bi bi-list-task"></i> Data Order</span>
        <select class="form-select form-select-sm" style="width:auto;" id="f-status" onchange="loadOrders(1)">
          <option value="">Semua Status</option>
          <option value="NEW">Baru</option>
          <option value="ASSIGNED">Ditugaskan</option>
          <option value="ON_THE_WAY">Menuju Lokasi</option>
          <option value="IN_PROGRESS">Dikerjakan</option>
          <option value="DONE">Selesai</option>
          <option value="REJECTED">Ditolak</option>
          <option value="CANCELLED">Dibatalkan</option>
        </select>
        <select class="form-select form-select-sm" style="width:auto;" id="f-priority" onchange="loadOrders(1)">
          <option value="">Semua Prioritas</option>
          <option value="HIGH">HIGH</option>
          <option value="MEDIUM">MEDIUM</option>
          <option value="LOW">LOW</option>
        </select>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadOrders(currentPage)"><i class="bi bi-arrow-clockwise"></i></button>
        <a href="form-order" class="btn btn-sm btn-primary" id="btn-buat-order" style="display:none;"><i class="bi bi-plus-lg"></i> Buat Order</a>
      </div>
      <div class="card-body p-0">
        <table class="table mb-0">
          <thead><tr>
            <th>No. Order</th><th>Customer</th><th>Kategori</th><th>Prioritas</th>
            <th>Status</th><th>Approval</th><th>Teknisi</th><th>Dibuat</th>
          </tr></thead>
          <tbody id="orders-body">
            <tr><td colspan="8"><div class="skeleton" style="height:18px;margin:8px 0;"></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="card-footer bg-white d-flex justify-content-between align-items-center">
        <span class="text-muted small" id="page-info">-</span>
        <div class="btn-group">
          <button class="btn btn-sm btn-outline-secondary" onclick="loadOrders(currentPage-1)" id="btn-prev">‹ Prev</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="loadOrders(currentPage+1)" id="btn-next">Next ›</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
  const session = requireAuth(['staff']);
  let currentPage = 1, totalPages = 1;
  if (session) {
    renderLayout({ active: 'orders', title: 'Data Order' });
    if (hasRole('ADMIN')) document.getElementById('btn-buat-order').style.display = '';
    loadOrders(1);
  }

  async function loadOrders(page) {
    if (page < 1) return;
    currentPage = page;
    const status = document.getElementById('f-status').value;
    const priority = document.getElementById('f-priority').value;
    const params = new URLSearchParams({ page, limit: 15 });
    if (status) params.set('status', status);
    if (priority) params.set('priority', priority);

    const body = document.getElementById('orders-body');
    body.innerHTML = '<tr><td colspan="8"><div class="skeleton" style="height:18px;margin:8px 0;"></div></td></tr>';
    try {
      const d = await api('/api/orders?' + params.toString());
      totalPages = d.pagination.total_pages || 1;
      if (!d.orders.length) {
        body.innerHTML = '<tr><td colspan="8"><div class="empty-state"><i class="bi bi-inbox"></i><p>Tidak ada order</p></div></td></tr>';
      } else {
        body.innerHTML = d.orders.map(o => `
          <tr class="clickable" onclick="location.href='order-detail?id=${o.id}'">
            <td><b>${o.order_no}</b></td>
            <td>${escapeHtml(o.nama_perusahaan)}</td>
            <td>${o.category}</td>
            <td>${priorityBadge(o.priority)}</td>
            <td>${statusBadge(o.status)}</td>
            <td>${approvalBadge(o.approval_status)}</td>
            <td>${o.technician_names ? escapeHtml(o.technician_names) : '<span class="text-muted">-</span>'}</td>
            <td class="text-muted small">${fmtDate(o.created_at)}</td>
          </tr>`).join('');
      }
      document.getElementById('page-info').textContent = `Halaman ${currentPage} dari ${totalPages} (${d.pagination.total} order)`;
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
    } catch (e) {
      body.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">Gagal memuat: ${e.message}</td></tr>`;
    }
  }
</script>
</body>
</html>
