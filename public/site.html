<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Master Site — OKI Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="content">
  <div id="topbar-slot"></div>

  <div class="page-body">
    <div class="card">
      <div class="card-header d-flex align-items-center flex-wrap gap-2">
        <span class="flex-grow-1"><i class="bi bi-geo-alt"></i> Master Site</span>
        <select class="form-select form-select-sm" style="max-width:220px;" id="filter-customer" onchange="loadSites()">
          <option value="">Semua Customer</option>
        </select>
        <input class="form-control form-control-sm" style="max-width:200px;" id="filter-search" placeholder="Cari kode/nama site..." oninput="debounceSearch()">
        <button class="btn btn-sm btn-primary" onclick="openModal()"><i class="bi bi-plus-lg"></i> Tambah Site</button>
      </div>
      <div class="card-body p-0">
        <table class="table mb-0">
          <thead><tr><th>Kode Site</th><th>Nama Site</th><th>Customer</th><th>Lokasi</th><th>Status Projek</th><th>Status Gangguan</th><th class="text-end">Aksi</th></tr></thead>
          <tbody id="site-body">
            <tr><td colspan="7"><div class="skeleton" style="height:18px;margin:8px 0;"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="siteModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="border-radius:16px;">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title">Tambah Site</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="s-id">

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Customer *</label>
            <select class="form-select" id="s-customer"><option value="">Memuat customer...</option></select>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Kode Site *</label>
            <input class="form-control" id="s-kode" placeholder="mis. DPK-01">
            <div class="form-text">Unik per customer (2 customer beda boleh pakai kode yang sama)</div>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Kategori</label>
            <select class="form-select" id="s-kategori">
              <option value="CORRECTIVE">Corrective</option>
              <option value="PREVENTIVE">Preventive</option>
              <option value="INSTALLATION">Installation</option>
              <option value="INSPECTION">Inspection</option>
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Nama Site *</label>
          <input class="form-control" id="s-nama" placeholder="mis. Kantor Cabang Depok">
        </div>

        <h6 class="fw-bold text-muted small text-uppercase mb-2">Titik Lokasi (klik peta buat set koordinat)</h6>
        <div id="site-map" style="height:240px;border-radius:12px;border:1px solid #dee2e6;"></div>
        <div class="form-text mb-3" id="latlng-hint">Belum dipilih — klik di peta</div>

        <div class="row">
          <div class="col-md-3 mb-3"><label class="form-label">Provinsi</label><input class="form-control" id="s-provinsi"></div>
          <div class="col-md-3 mb-3"><label class="form-label">Kota</label><input class="form-control" id="s-kota"></div>
          <div class="col-md-3 mb-3"><label class="form-label">Kecamatan</label><input class="form-control" id="s-kecamatan"></div>
          <div class="col-md-3 mb-3"><label class="form-label">Kelurahan</label><input class="form-control" id="s-kelurahan"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Alamat Detail</label>
          <textarea class="form-control" id="s-alamat" rows="2" placeholder="Nama jalan, nomor, dst"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Keterangan Pekerjaan</label>
          <input class="form-control" id="s-keterangan" placeholder="mis. Pemasangan jaringan internet">
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Status Projek</label>
            <select class="form-select" id="s-status-projek">
              <option value="ACTIVE">Active</option>
              <option value="NON_ACTIVE">Non Active</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Status Gangguan</label>
            <select class="form-select" id="s-status-gangguan">
              <option value="BERJALAN">Berjalan</option>
              <option value="GANGGUAN">Gangguan</option>
              <option value="MAINTENANCE">Maintenance</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary" onclick="saveSite()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
  const session = requireAuth(['staff']);
  let modal, sites = [], customers = [], siteMap, siteMarker, searchTimer;

  if (session && session.role !== 'ADMIN') {
    document.body.innerHTML = '<div class="empty-state" style="margin:60px auto;"><i class="bi bi-shield-lock"></i><p>Master Site hanya untuk role <b>Admin</b>.</p><a href="dashboard" class="btn btn-primary btn-sm">Kembali ke Dashboard</a></div>';
  } else if (session) {
    renderLayout({ active: 'site', title: 'Master Site' });
    loadCustomersForFilterAndForm();
    loadSites();
  }

  async function loadCustomersForFilterAndForm() {
    try {
      const d = await api('/api/customers');
      customers = d.customers;
      const opts = customers.map(c => `<option value="${c.id}">${escapeHtml(c.nama_perusahaan)}</option>`).join('');
      document.getElementById('filter-customer').innerHTML = '<option value="">Semua Customer</option>' + opts;
      document.getElementById('s-customer').innerHTML = '<option value="">Pilih customer...</option>' + opts;
    } catch (e) { toast(e.message, 'error'); }
  }

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadSites, 350);
  }

  async function loadSites() {
    const body = document.getElementById('site-body');
    const customerId = document.getElementById('filter-customer').value;
    const search = document.getElementById('filter-search').value.trim();
    try {
      const params = new URLSearchParams();
      if (customerId) params.set('customer_id', customerId);
      if (search) params.set('search', search);
      const d = await api(`/api/sites?${params.toString()}`);
      sites = d.sites;
      if (!sites.length) {
        body.innerHTML = '<tr><td colspan="7"><div class="empty-state"><i class="bi bi-geo-alt"></i><p>Belum ada site terdaftar</p></div></td></tr>';
        return;
      }
      body.innerHTML = sites.map(s => `
        <tr>
          <td><b>${escapeHtml(s.kode_site)}</b></td>
          <td>${escapeHtml(s.site_name)}</td>
          <td class="text-muted small">${escapeHtml(s.nama_perusahaan)}</td>
          <td class="text-muted small">${escapeHtml([s.kota, s.provinsi].filter(Boolean).join(', ') || '-')}</td>
          <td>${s.status_projek === 'ACTIVE' ? '<span class="badge badge-status-DONE">Active</span>' : '<span class="badge badge-approval-PENDING">Non Active</span>'}</td>
          <td>${statusGangguanBadge(s.status_gangguan)}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary" onclick="openModal(${s.id})"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteSite(${s.id})"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`).join('');
    } catch (e) {
      body.innerHTML = `<tr><td colspan="7" class="text-center text-danger py-4">${e.message}</td></tr>`;
    }
  }

  function statusGangguanBadge(s) {
    const map = { BERJALAN: 'badge-status-DONE', GANGGUAN: 'badge-priority-HIGH', MAINTENANCE: 'badge-approval-PENDING' };
    const label = { BERJALAN: 'Berjalan', GANGGUAN: 'Gangguan', MAINTENANCE: 'Maintenance' };
    return `<span class="badge ${map[s] || ''}">${label[s] || s}</span>`;
  }

  function openModal(id) {
    if (!modal) modal = new bootstrap.Modal(document.getElementById('siteModal'));
    const s = sites.find(x => x.id === id) || {};
    document.getElementById('modal-title').textContent = id ? 'Edit Site' : 'Tambah Site';
    document.getElementById('s-id').value = id || '';
    document.getElementById('s-customer').value = s.customer_id || '';
    document.getElementById('s-kode').value = s.kode_site || '';
    document.getElementById('s-kategori').value = s.kategori || 'CORRECTIVE';
    document.getElementById('s-nama').value = s.site_name || '';
    document.getElementById('s-provinsi').value = s.provinsi || '';
    document.getElementById('s-kota').value = s.kota || '';
    document.getElementById('s-kecamatan').value = s.kecamatan || '';
    document.getElementById('s-kelurahan').value = s.kelurahan || '';
    document.getElementById('s-alamat').value = s.alamat_detail || '';
    document.getElementById('s-keterangan').value = s.keterangan_pekerjaan || '';
    document.getElementById('s-status-projek').value = s.status_projek || 'ACTIVE';
    document.getElementById('s-status-gangguan').value = s.status_gangguan || 'BERJALAN';

    modal.show();
    setTimeout(() => {
      initSiteMap();
      const lat = s.latitude ? Number(s.latitude) : null;
      const lng = s.longitude ? Number(s.longitude) : null;
      if (lat && lng) setSitePoint(lat, lng); else document.getElementById('latlng-hint').textContent = 'Belum dipilih — klik di peta';
    }, 250);
  }

  function initSiteMap() {
    if (siteMap) { siteMap.remove(); siteMap = null; siteMarker = null; }
    siteMap = L.map('site-map').setView([-6.4, 106.8], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(siteMap);
    siteMap.on('click', (e) => setSitePoint(e.latlng.lat, e.latlng.lng));
    siteMap.invalidateSize();
  }

  function setSitePoint(lat, lng) {
    siteMap.dataset_lat = lat.toFixed(7);
    siteMap.dataset_lng = lng.toFixed(7);
    document.getElementById('latlng-hint').innerHTML = `<i class="bi bi-geo-alt-fill text-primary"></i> ${lat.toFixed(7)}, ${lng.toFixed(7)}`;
    if (siteMarker) siteMarker.setLatLng([lat, lng]); else siteMarker = L.marker([lat, lng]).addTo(siteMap);
    siteMap.setView([lat, lng], 15);
  }

  async function saveSite() {
    const id = document.getElementById('s-id').value;
    const payload = {
      customer_id: Number(document.getElementById('s-customer').value) || null,
      kode_site: document.getElementById('s-kode').value.trim(),
      site_name: document.getElementById('s-nama').value.trim(),
      kategori: document.getElementById('s-kategori').value,
      latitude: siteMap ? siteMap.dataset_lat || null : null,
      longitude: siteMap ? siteMap.dataset_lng || null : null,
      provinsi: document.getElementById('s-provinsi').value.trim(),
      kota: document.getElementById('s-kota').value.trim(),
      kecamatan: document.getElementById('s-kecamatan').value.trim(),
      kelurahan: document.getElementById('s-kelurahan').value.trim(),
      alamat_detail: document.getElementById('s-alamat').value.trim(),
      keterangan_pekerjaan: document.getElementById('s-keterangan').value.trim(),
      status_projek: document.getElementById('s-status-projek').value,
      status_gangguan: document.getElementById('s-status-gangguan').value,
    };
    if (!payload.customer_id) { toast('Pilih customer dulu', 'error'); return; }
    if (!payload.kode_site || !payload.site_name) { toast('Kode site & nama site wajib diisi', 'error'); return; }
    if (!payload.latitude || !payload.longitude) { toast('Titik lokasi wajib diisi — klik di peta', 'error'); return; }

    try {
      if (id) {
        await api(`/api/sites/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
      } else {
        await api('/api/sites', { method: 'POST', body: JSON.stringify(payload) });
      }
      toast('Site berhasil disimpan', 'success');
      modal.hide();
      loadSites();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function deleteSite(id) {
    if (!confirm('Hapus site ini?')) return;
    try {
      await api(`/api/sites/${id}`, { method: 'DELETE' });
      toast('Site dihapus', 'success');
      loadSites();
    } catch (e) { toast(e.message, 'error'); }
  }
</script>
</body>
</html>
